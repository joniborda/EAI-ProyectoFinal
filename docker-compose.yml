name: forecast

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123 --api S3v4; do sleep 2; done &&
      mc mb -p local/mlflow || true &&
      mc anonymous set none local/mlflow
      "
    restart: "no"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --serve-artifacts
      --allowed-hosts "*"
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/5000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: sales-forecasting
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MODEL_OUTPUT_DIR: /app/reports/eda/models
      FEATURES_PATH: /app/reports/eda/features/features.jsonl
      WINDOWS_PATH: /app/reports/eda/features/windows.npz
      TARGET_COL: orders
      VAL_RATIO: "0.2"
      RANDOM_STATE: "42"
      SELECTION_METRIC: mae
    restart: "no"
    volumes:
      - ./reports:/app/reports
      - ./reference:/opt/reference

  http-api:
    build:
      context: .
      dockerfile: http-api/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_OUTPUT_DIR: /app/reports/eda/models
      FEATURES_PATH: /app/reports/eda/features/features.jsonl
      WINDOWS_PATH: /app/reports/eda/features/windows.npz
      TARGET_COL: orders
      SELECTION_METRIC: mae
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports

volumes:
  minio-data:
  pg-data:
